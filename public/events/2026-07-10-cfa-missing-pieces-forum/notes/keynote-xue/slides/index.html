<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>翻頁簡報 ｜ 為什麼兒家署仍然不夠？ ｜ 薛承泰 教授</title>
<link rel="canonical" href="https://aabe.org.tw/events/2026-07-10-cfa-missing-pieces-forum/notes/keynote-xue/slides/">
<meta name="description" content="薛承泰教授主題演講「為什麼兒家署仍然不夠？——從制度缺口看全貌」學術簡約重製版翻頁簡報，共 30 張。2026 兒少政策論壇。">
<meta name="robots" content="index,follow,max-image-preview:large">
<meta property="og:title" content="翻頁簡報｜為什麼兒家署仍然不夠？｜薛承泰">
<meta property="og:description" content="主題演講學術簡約重製版，共 30 張，可翻頁瀏覽。">
<meta property="og:type" content="article">
<meta property="og:url" content="https://aabe.org.tw/events/2026-07-10-cfa-missing-pieces-forum/notes/keynote-xue/slides/">
<meta property="og:site_name" content="國教行動聯盟">
<style>
  :root{ --deep:#0c3a2e; --deep2:#0f4636; --paper:#fbf6ec; --amber:#e0b878; --clay:#e08a4e; --line:rgba(255,255,255,.14); }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--deep);color:#eef3ef;font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
    display:flex;flex-direction:column;overflow:hidden;height:100dvh}
  /* 頂列 */
  .bar{display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:1px solid var(--line);
    background:var(--deep2);flex:none}
  .bar a{color:#cfe0d5;text-decoration:none;font-size:13px}
  .bar a:hover{color:var(--amber)}
  .bar .t{font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;color:#fff;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .sp{flex:1}
  .bar .count{font-family:Georgia,serif;font-size:14px;color:var(--amber);font-weight:700;letter-spacing:1px;flex:none}
  /* 舞台 */
  .stage{flex:1;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;padding:2.2vmin}
  .slide{max-width:100%;max-height:100%;box-shadow:0 18px 50px rgba(0,0,0,.5);border-radius:4px;background:#fff;
    user-select:none;-webkit-user-drag:none}
  /* 點擊區 */
  .zone{position:absolute;top:0;bottom:0;width:34%;cursor:pointer;z-index:2}
  .zone.l{left:0}.zone.r{right:0}
  /* 箭頭 */
  .nav{position:absolute;top:50%;transform:translateY(-50%);z-index:3;width:44px;height:44px;border-radius:50%;
    border:1px solid var(--line);background:rgba(12,58,46,.6);color:#eef3ef;font-size:20px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);transition:background .2s}
  .nav:hover{background:var(--clay);border-color:var(--clay)}
  .nav.prev{left:14px}.nav.next{right:14px}
  .nav[disabled]{opacity:.28;pointer-events:none}
  /* 底列進度 */
  .foot{flex:none;padding:8px 18px 14px;background:var(--deep2);border-top:1px solid var(--line)}
  .prog{height:4px;background:rgba(255,255,255,.12);border-radius:3px;overflow:hidden}
  .prog>i{display:block;height:100%;background:var(--clay);width:0;transition:width .25s}
  .hint{margin-top:7px;font-size:11.5px;color:#9db4a8;text-align:center;letter-spacing:.03em}
  @media (max-width:640px){ .nav{width:38px;height:38px;font-size:17px} .bar .t{font-size:13px} .hint .k{display:none} }
</style>
</head>
<body>

<div class="bar">
  <a href="../">← 回到本場</a>
  <span class="t">薛承泰 · 為什麼兒家署仍然不夠？</span>
  <span class="sp"></span>
  <span class="count"><span id="cur">1</span> / 30</span>
</div>

<div class="stage" id="stage">
  <button class="nav prev" id="prev" aria-label="上一張">‹</button>
  <img class="slide" id="img" src="../../img/keynote/xue-01.jpg" alt="投影片 1" draggable="false">
  <div class="zone l" id="zl" aria-label="上一張"></div>
  <div class="zone r" id="zr" aria-label="下一張"></div>
  <button class="nav next" id="next" aria-label="下一張">›</button>
</div>

<div class="foot">
  <div class="prog"><i id="bar"></i></div>
  <div class="hint"><span class="k">← → 或 </span>點擊左右／滑動翻頁　·　學術簡約重製版　·　共 30 張</div>
</div>

<script>
(function(){
  var N=30, i=0;
  var img=document.getElementById('img'), cur=document.getElementById('cur'),
      bar=document.getElementById('bar'), prev=document.getElementById('prev'), next=document.getElementById('next');
  function pad(n){return (n<10?'0':'')+n;}
  function pre(n){ if(n>=0&&n<N){ var im=new Image(); im.src='../../img/keynote/xue-'+pad(n+1)+'.jpg'; } }
  function show(n){
    i=Math.max(0,Math.min(N-1,n));
    img.src='../../img/keynote/xue-'+pad(i+1)+'.jpg';
    img.alt='投影片 '+(i+1);
    cur.textContent=i+1;
    bar.style.width=((i+1)/N*100)+'%';
    prev.disabled=(i===0); next.disabled=(i===N-1);
    pre(i+1); pre(i-1);
  }
  prev.onclick=function(){show(i-1);};
  next.onclick=function(){show(i+1);};
  document.getElementById('zl').onclick=function(){show(i-1);};
  document.getElementById('zr').onclick=function(){show(i+1);};
  document.addEventListener('keydown',function(e){
    if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' '){e.preventDefault();show(i+1);}
    else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();show(i-1);}
    else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(N-1);}
  });
  var x0=null;
  document.getElementById('stage').addEventListener('touchstart',function(e){x0=e.touches[0].clientX;},{passive:true});
  document.getElementById('stage').addEventListener('touchend',function(e){
    if(x0===null)return; var dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>40){ show(dx<0? i+1 : i-1); } x0=null;
  },{passive:true});
  show(0);
})();
</script>
</body>
</html>
